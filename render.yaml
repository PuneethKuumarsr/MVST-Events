services:
  - type: web
    name: mvstevents
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_DEVELOPER_MODE
        value: false
      - key: MANGALYA_SPONSORSHIP_SHEET_ID
        sync: false
      - key: MANGALYA_SPONSORSHIP_RANGE
        value: "'Sponsorship 2026'!A:AZ"
      - key: SPONSORSHIP_REQUIREMENTS_RANGE
        value: "'Sponsorship Requirements'!A:O"
      - key: DEFAULT_SPONSORSHIP_CATEGORY
        value: ""
      - key: DEFAULT_SPONSORSHIP_UNIT
        value: ""
      - key: VITE_ACTIVE_EVENT_YEAR
        value: "2026"
